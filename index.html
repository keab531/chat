<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSS GREEN CHAT</title>
    <style>
        :root {
            --tg-bg: #e7ebf0;
            --tg-sidebar-bg: #ffffff;
            --tg-primary: #3390ec;
            --tg-primary-hover: #297cca;
            --tg-my-bubble: #eeffde;
            --tg-other-bubble: #ffffff;
            --tg-text: #000000;
            --tg-text-muted: #707579;
            --tg-border: #e4e4e4;
            --tg-input-bg: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ----- TELEGRAM INITIAL SIGN-IN OVERLAY ----- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999; opacity: 1; visibility: visible;
            transition: opacity 0.25s ease, visibility 0.25s;
        }
        .login-card {
            width: 100%; max-width: 360px; text-align: center; padding: 20px;
        }
        .login-logo {
            width: 100px; height: 100px; background: var(--tg-primary); border-radius: 50%;
            margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
        }
        .login-logo svg { width: 50px; height: 50px; fill: white; margin-left: -4px; }
        .login-card h2 { font-size: 26px; font-weight: 500; margin-bottom: 12px; }
        .login-card p { color: var(--tg-text-muted); font-size: 15px; margin-bottom: 32px; line-height: 1.4; }
        .login-input {
            width: 100%; padding: 14px 16px; border: 1px solid var(--tg-border);
            border-radius: 12px; font-size: 16px; outline: none; margin-bottom: 20px; transition: border 0.2s;
        }
        .login-input:focus { border-color: var(--tg-primary); }
        .login-btn {
            width: 100%; padding: 14px; background: var(--tg-primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.15s;
        }
        .login-btn:hover { background: var(--tg-primary-hover); }

        /* ----- MAIN TELEGRAM APPARATUS ----- */
        #tg-layout {
            width: 100%; height: 100%; display: flex; background: #ffffff; max-width: 1680px;
        }

        @media (min-width: 1200px) {
            #tg-layout {
                height: 92vh; max-height: 900px; width: 90vw; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden;
            }
        }

        /* Sidebar: Contacts/Users List */
        .sidebar {
            width: 340px; min-width: 340px; background: var(--tg-sidebar-bg); border-right: 1px solid var(--tg-border);
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .search-bar-container { padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
        .search-input {
            flex: 1; padding: 10px 16px; border: 1px solid transparent; border-radius: 22px;
            font-size: 14px; outline: none; background: #f1f1f1; transition: background 0.2s, border 0.2s;
        }
        .search-input:focus { background: #ffffff; border-color: var(--tg-primary); }
        .user-list { flex: 1; overflow-y: auto; }
        
        .user-item {
            display: flex; align-items: center; padding: 10px 16px; cursor: pointer; transition: background 0.1s;
        }
        .user-item:hover { background: #f4f4f5; }
        .user-item.active { background: var(--tg-primary); color: white; }
        .user-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: #55aaff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white; margin-right: 14px; font-size: 16px; user-select: none;
        }
        .user-info { display: flex; flex-direction: column; }
        .user-info .name { font-size: 15px; font-weight: 500; }
        .user-info .subtext { font-size: 13px; color: var(--tg-text-muted); margin-top: 2px; }
        .user-item.active .user-info .subtext { color: #e1efff; }

        /* Main Chat Window Panel */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: #f4f4f5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') repeat; }
        
        .chat-header {
            padding: 10px 24px; background: #ffffff; border-bottom: 1px solid var(--tg-border);
            display: flex; align-items: center; gap: 16px; height: 56px;
        }
        .menu-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--tg-text-muted); }
        .header-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .header-info p { font-size: 13px; color: var(--tg-text-muted); }
        .filter-clear-btn {
            margin-left: auto; background: #f0f4f9; border: none; padding: 6px 14px;
            font-size: 13px; color: var(--tg-primary); border-radius: 16px; cursor: pointer; font-weight: 500; display: none;
        }

        /* Message Display Logs Feed */
        #chat-window { flex: 1; padding: 16px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        .msg-bubble-container { display: flex; width: 100%; }
        .msg-bubble-container.sent { justify-content: flex-end; }
        .msg-bubble-container.received { justify-content: flex-start; }

        .tg-bubble {
            padding: 6px 12px 6px 14px; border-radius: 12px; max-width: 65%; font-size: 15px; 
            line-height: 1.4; word-wrap: break-word; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 1px 1px rgba(0,0,0,0.07);
        }
        .sent .tg-bubble { background: var(--tg-my-bubble); border-top-right-radius: 4px; }
        .received .tg-bubble { background: var(--tg-other-bubble); border-top-left-radius: 4px; }

        .bubble-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; display: block; user-select: none; }
        /* Dynamic pseudo-random color mapping for standard visual group chats */
        .color-1 { color: #e53935; } .color-2 { color: #d81b60; } .color-3 { color: #8e24aa; } .color-4 { color: #3949ab; } .color-5 { color: #00897b; }

        .bubble-footer { display: flex; align-items: center; justify-content: flex-end; align-self: flex-end; margin-left: 16px; margin-top: 2px; float: right; margin-bottom: -4px; margin-right: -4px; }
        .bubble-time { font-size: 11px; color: #a3a7aa; user-select: none; }
        .sent .bubble-time { color: #629660; }
        .tg-ticks { font-size: 12px; color: #40a7e3; margin-left: 4px; font-weight: bold; line-height: 1; }

        /* Bottom Chat Action Strip */
        .input-bar-container { padding: 12px 16px; background: transparent; display: flex; justify-content: center; }
        .input-pill-wrapper {
            width: 100%; max-width: 720px; background: #ffffff; border-radius: 24px; padding: 4px 8px 4px 18px;
            display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.07); border: 1px solid transparent;
        }
        #user-input { flex: 1; border: none; outline: none; font-size: 16px; padding: 10px 0; max-height: 120px; }
        #send-btn {
            background: none; border: none; font-size: 15px; font-weight: 600; color: var(--tg-primary);
            cursor: pointer; padding: 8px 14px; border-radius: 50%; user-select: none;
        }
        #send-btn:hover { color: var(--tg-primary-hover); }

        /* ----- MOBILE ADAPTIVE RESPONSIVENESS PARADIGM ----- */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; width: 280px; min-width: 280px;
                transform: translateX(-100%); box-shadow: 4px 0 16px rgba(0,0,0,0.1);
            }
            .sidebar.open { transform: translateX(0); }
            .tg-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.17L7.74 12.2 3.64 10.92c-.89-.27-.9-.89.19-1.32L19.93 3.3c.74-.27 1.39.18 1.16 1.19l-2.73 12.83c-.2 1.01-.8 1.26-1.65.78l-4.16-3.07-2.01 1.94c-.22.22-.4.4-.82.4z"/></svg>
            </div>
            <h2>Telegram</h2>
            <p>Please enter your name to connect to the public channel stream setup.</p>
            <input type="text" id="username-input" class="login-input" placeholder="Your Name" autocomplete="off" maxlength="18">
            <button id="join-btn" class="login-btn">Start Messaging</button>
        </div>
    </div>

    <div id="tg-layout">
        <div class="sidebar" id="tg-sidebar">
            <div class="search-bar-container">
                <input type="text" id="search-users" class="search-input" placeholder="Search">
            </div>
            <div class="user-list" id="user-list"></div>
        </div>

        <div class="chat-view">
            <div class="chat-header">
                <button class="menu-toggle" id="menu-btn">☰</button>
                <div class="header-info">
                    <h3 id="room-title">Global Chat Room</h3>
                    <p id="room-subtitle">loading members...</p>
                </div>
                <button class="filter-clear-btn" id="clear-filter-btn">Show All</button>
            </div>

            <div id="chat-window"></div>

            <div class="input-bar-container">
                <div class="input-pill-wrapper">
                    <input type="text" id="user-input" placeholder="Message" autocomplete="off">
                    <button id="send-btn">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 1. Assign Your Unique Application Key Framework Config String Objects Below
        // 1. Paste Your Specific App Configuration Keys Here
      const firebaseConfig = {
        apiKey: "AIzaSyCDEwEwr6QbNIArFm4sGThxq4scpqDbbnE",
        databaseURL: "https://keabi-800a6-default-rtdb.firebaseio.com",
        projectId: "keabi-800a6",
      };

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const messagesRef = database.ref('messages');

const loginOverlay = document.getElementById('login-overlay');
const usernameInput = document.getElementById('username-input');
const joinBtn = document.getElementById('join-btn');
const chatWindow = document.getElementById('chat-window');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const searchUsers = document.getElementById('search-users');
const userListContainer = document.getElementById('user-list');
const roomTitle = document.getElementById('room-title');
const roomSubtitle = document.getElementById('room-subtitle');
const clearFilterBtn = document.getElementById('clear-filter-btn');
const menuBtn = document.getElementById('menu-btn');
const tgSidebar = document.getElementById('tg-sidebar');

let myUsername = "";
let trackedUsersSet = new Set(); 
let allMessagesArray = []; 
let selectedUserFilter = ""; 

// Local Storage Session Caching Check
window.addEventListener('DOMContentLoaded', () => {
    const cachedHandle = localStorage.getItem('tg_username');
    if(cachedHandle) {
        myUsername = cachedHandle;
        loginOverlay.style.opacity = '0';
        loginOverlay.style.visibility = 'hidden';
        userInput.focus();
    }
});

function performJoinHandshake() {
    const rawName = usernameInput.value.trim();
    if(!rawName) return alert("Please enter a username to proceed.");
    myUsername = rawName;
    localStorage.setItem('tg_username', rawName);
    loginOverlay.style.opacity = '0';
    setTimeout(() => loginOverlay.style.visibility = 'hidden', 250);
    userInput.focus();
}

joinBtn.addEventListener('click', performJoinHandshake);
usernameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performJoinHandshake(); });

// Responsive Sidebar Drawer Toggle
menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    tgSidebar.classList.toggle('open');
});
document.addEventListener('click', () => tgSidebar.classList.remove('open'));
tgSidebar.addEventListener('click', (e) => e.stopPropagation());

function getUserColorClass(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    return `color-${Math.abs(hash % 5) + 1}`;
}

// RENDERING ENGINE: Draws message sequentially in the exact order they arrive
function createMessageElement(data) {
    const container = document.createElement('div');
    container.classList.add('msg-bubble-container');
    
    const isMe = data.username === myUsername;
    container.classList.add(isMe ? 'sent' : 'received');

    const timeString = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

    if (isMe) {
        container.innerHTML = `
            <div class="tg-bubble">
                <span>${escapeHTML(data.text)}</span>
                <div class="bubble-footer">
                    <span class="bubble-time">${timeString}</span>
                    <span class="tg-ticks">✓✓</span>
                </div>
            </div>`;
    } else {
        container.innerHTML = `
            <div class="tg-bubble">
                <span class="bubble-name ${getUserColorClass(data.username)}">${escapeHTML(data.username)}</span>
                <span>${escapeHTML(data.text)}</span>
                <div class="bubble-footer">
                    <span class="bubble-time">${timeString}</span>
                </div>
            </div>`;
    }
    return container;
}

// This function filters messages visibly when a sidebar contact is clicked
function filterChatDisplay() {
    chatWindow.innerHTML = "";
    allMessagesArray.forEach(data => {
        if (selectedUserFilter && data.username.toLowerCase() !== selectedUserFilter.toLowerCase()) return;
        chatWindow.appendChild(createMessageElement(data));
    });
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function updateSidebarUsersList(name) {
    if(!name || trackedUsersSet.has(name)) return;
    trackedUsersSet.add(name);
    renderUserList(searchUsers.value);
}

function renderUserList(filterText = "") {
    userListContainer.innerHTML = "";
    const cleanFilter = filterText.toLowerCase().trim();
    roomSubtitle.textContent = `${trackedUsersSet.size} members`;

    trackedUsersSet.forEach(user => {
        if(cleanFilter && !user.toLowerCase().includes(cleanFilter)) return;

        const userRow = document.createElement('div');
        userRow.classList.add('user-item');
        if (selectedUserFilter && user.toLowerCase() === selectedUserFilter.toLowerCase()) {
            userRow.classList.add('active');
        }

        userRow.innerHTML = `
            <div class="user-avatar" style="background-color: ${stringToColor(user)}">${user.charAt(0).toUpperCase()}</div>
            <div class="user-info">
                <span class="name">${escapeHTML(user)}</span>
                <span class="subtext">view history</span>
            </div>
        `;

        userRow.addEventListener('click', () => {
            selectedUserFilter = user;
            roomTitle.textContent = `Messages from ${user}`;
            clearFilterBtn.style.display = 'block';
            tgSidebar.classList.remove('open');
            renderUserList(searchUsers.value);
            filterChatDisplay();
        });

        userListContainer.appendChild(userRow);
    });
}

clearFilterBtn.addEventListener('click', () => {
    selectedUserFilter = "";
    roomTitle.textContent = "Global Chat Room";
    clearFilterBtn.style.display = 'none';
    renderUserList(searchUsers.value);
    filterChatDisplay();
});

// Outbound Message Dispatch
function transmitMessage() {
    const text = userInput.value.trim();
    if (!text || !myUsername) return;

    messagesRef.push({
        username: myUsername,
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP // Uses Firebase Server time to prevent local clock conflicts
    });
    userInput.value = '';
}

sendBtn.addEventListener('click', transmitMessage);
userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') transmitMessage(); });
searchUsers.addEventListener('input', (e) => renderUserList(e.target.value));

// Core Realtime Listener Loop: Appends messages sequentially down the page
messagesRef.limitToLast(150).on('child_added', (snapshot) => {
    const data = snapshot.val();
    if(data && data.username && data.text) {
        updateSidebarUsersList(data.username);
        
        const msgObj = {
            username: data.username,
            text: data.text,
            timestamp: data.timestamp || Date.now()
        };
        
        allMessagesArray.push(msgObj);

        // If not actively filtered, add directly to bottom of the screen instantly
        if (!selectedUserFilter || msgObj.username.toLowerCase() === selectedUserFilter.toLowerCase()) {
            chatWindow.appendChild(createMessageElement(msgObj));
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    }
});

function escapeHTML(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const colors = ['#2ec4b6', '#e71d36', '#ff9f1c', '#00b4d8', '#9d4edd', '#ff007f', '#4ea8de'];
    return colors[Math.abs(hash % colors.length)];
}
    </script>
</body>
</html>
