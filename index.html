<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat-App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff',
                            100: '#ebf0fe',
                            550: '#4f46e5', /* Indigo Accent Primary */
                            600: '#4338ca',
                            700: '#3730a3',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col font-sans antialiased transition-colors duration-200">

    <div class="flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 border-b border-slate-200 dark:border-slate-800/80 px-6 flex justify-between items-center bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-md z-10 shadow-sm shrink-0">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-brand-550 rounded-xl text-white shadow-md shadow-indigo-500/20">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-md font-bold tracking-tight text-slate-900 dark:text-white flex items-center gap-2">
                        Chat-App <span class="text-xs px-2 py-0.5 rounded-full font-medium bg-indigo-500/10 text-indigo-500 dark:bg-indigo-400/10 dark:text-indigo-400 border border-indigo-500/20">v1.0</span>
                    </h1>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="statusBadge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700/60">
                    <span class="w-2 h-2 rounded-full bg-slate-400" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>

                <button id="themeToggle" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 hover:scale-105 active:scale-95 transition-all">
                    <svg class="w-5 h-5 hidden dark:block text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    <svg class="w-5 h-5 dark:hidden text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <section class="flex-1 flex flex-col bg-slate-50 dark:bg-[#0f172a] overflow-hidden">
                
                <div class="p-4 border-b border-slate-200 dark:border-slate-800/60 bg-white dark:bg-[#1e293b]/30 flex gap-3 items-center shrink-0">
                    <div class="relative flex-1 max-w-lg">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </span>
                        <input type="text" id="searchBar" placeholder="Search messages..." class="w-full p-2.5 pl-10 rounded-xl bg-white dark:bg-[#1e293b]/70 border border-slate-200 dark:border-slate-800/80 text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600 shadow-sm">
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 font-medium">Chat As:</span>
                        <input type="text" id="username" value="Guest User" class="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-[#1e293b] text-xs font-semibold text-brand-550 focus:outline-none w-32">
                    </div>
                </div>

                <div id="chatMessages" class="flex-1 p-6 overflow-y-auto space-y-4 flex flex-col bg-gradient-to-b from-slate-50 to-slate-100 dark:from-[#0f172a] dark:to-[#090d16]">
                    <div id="loadingNotice" class="text-center max-w-sm mx-auto my-auto space-y-3">
                        <p class="text-xs text-slate-400 dark:text-slate-500">Connecting to server storage parameters...</p>
                    </div>
                </div>

                <div class="border-t border-slate-200 dark:border-slate-800/80 p-4 bg-white dark:bg-[#1e293b]/30 shrink-0">
                    <form id="chatForm" class="max-w-4xl mx-auto flex gap-3">
                        <input type="text" id="messageInput" placeholder="Type a message, press enter to broadcast..." autocomplete="off" class="flex-1 p-3 rounded-xl bg-white dark:bg-[#0f172a] border border-slate-200 dark:border-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-brand-550 shadow-inner placeholder:text-slate-400 dark:placeholder:text-slate-600">
                        <button type="submit" id="sendBtn" class="bg-brand-550 hover:bg-brand-600 text-white px-5 rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-600/10 flex items-center gap-2 hover:scale-[1.02] active:scale-[0.98]">
                            <span>Send</span>
                            <svg class="w-4 h-4 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        // ==========================================
        //  🔒 CONFIGURATION KEYS INSIDE THE CODE
        // ==========================================
        const CONFIG = {
            token: "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",       // Paste your fine-grained GitHub token here
            owner: "your_github_username", // Paste your GitHub username here
            repo: "your_repository_name",  // Paste your storage repository name here
            path: "data.json"              // Target JSON storage file name
        };

        let messages = [];
        let fileSha = null;
        let updateInterval = null;
        let timestampInterval = null;

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        function getRelativeTimeString(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const elapsed = now - date;
            const msPerMinute = 60 * 1000;
            const msPerHour = msPerMinute * 60;
            const msPerDay = msPerHour * 24;

            if (elapsed < msPerMinute) return 'just now';
            if (elapsed < msPerHour) {
                const mins = Math.round(elapsed / msPerMinute);
                return `${mins}m ago`;
            }
            if (elapsed < msPerDay) {
                const hours = Math.round(elapsed / msPerHour);
                return `${hours}h ago`;
            }
            return date.toLocaleDateString(undefined, {month: 'short', day: 'numeric'});
        }

        async function fetchMessages() {
            if (!CONFIG.token || CONFIG.token.includes("YOUR_TOKEN")) {
                document.getElementById('chatMessages').innerHTML = `
                    <div class="text-center max-w-sm mx-auto my-auto text-rose-500 text-sm font-semibold">
                        Configuration Needed: Open index.html and update the CONFIG block with your tokens.
                    </div>`;
                updateStatusBadge(false);
                return;
            }

            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (!response.ok) throw new Error('Unmapped mesh node');
                const data = await response.json();
                fileSha = data.sha; 
                
                const decodedContent = decodeURIComponent(atob(data.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                messages = JSON.parse(decodedContent || '[]');
                renderMessages();
                updateStatusBadge(true);
            } catch (error) {
                console.error("Downstream link error:", error);
                updateStatusBadge(false);
            }
        }

        async function sendMessage(text) {
            if (!fileSha) {
                alert("Cannot send message: App is currently offline or unable to link to your GitHub repository storage block. Check your CONFIG variables.");
                return;
            }

            const user = document.getElementById('username').value || 'Anonymous';
            if (!text.trim()) return;

            const newMessage = {
                id: Date.now().toString(),
                user: user,
                text: text.trim(),
                timestamp: new Date().toISOString()
            };

            messages.unshift(newMessage);
            renderMessages();

            const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
            const updatedContentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(messages, null, 2))));

            const payload = {
                message: `Chat packet upload [By ${user}]`,
                content: updatedContentBase64,
                sha: fileSha
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${CONFIG.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error('Upstream rejected package block');
                const resData = await response.json();
                fileSha = resData.content.sha; 
            } catch (error) {
                fetchMessages();
            }
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const currentUser = document.getElementById('username').value || 'Anonymous';
            
            const filteredMessages = messages.filter(msg => {
                return msg.user.toLowerCase().includes(searchQuery) || msg.text.toLowerCase().includes(searchQuery);
            });

            filteredMessages.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (filteredMessages.length === 0) {
                container.innerHTML = `<div class="text-center my-auto text-sm text-slate-400 dark:text-slate-600">No logs found.</div>`;
                return;
            }

            container.innerHTML = filteredMessages.map(msg => {
                const isMe = msg.user === currentUser;
                return `
                <div class="flex flex-col gap-1 max-w-[80%] ${isMe ? 'self-end items-end' : 'self-start items-start'} group transition-all duration-200">
                    <div class="flex items-center gap-2 px-1">
                        <span class="text-xs font-bold tracking-wide ${isMe ? 'text-indigo-500' : 'text-slate-500'}">${escapeHTML(msg.user)}</span>
                        <span class="text-[10px] text-slate-400 data-timestamp" data-time="${msg.timestamp}">${getRelativeTimeString(msg.timestamp)}</span>
                    </div>
                    <div class="p-3.5 rounded-2xl text-sm border shadow-sm ${
                        isMe ? 'bg-brand-550 text-white border-transparent rounded-tr-none' : 'bg-white dark:bg-[#1e293b] text-slate-800 dark:text-slate-200 border-slate-200 dark:border-slate-800/80 rounded-tl-none'
                    }">
                        <p class="whitespace-pre-wrap break-words">${escapeHTML(msg.text)}</p>
                    </div>
                </div>`
            }).join('');
        }

        function updateTimestamps() {
            document.querySelectorAll('.data-timestamp').forEach(el => {
                el.textContent = getRelativeTimeString(el.getAttribute('data-time'));
            });
        }

        function updateStatusBadge(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            dot.className = connected ? "w-2 h-2 rounded-full bg-emerald-500 animate-pulse" : "w-2 h-2 rounded-full bg-rose-500";
            text.textContent = connected ? "Active" : "Offline";
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await fetchMessages();
            if(fileSha) {
                updateInterval = setInterval(fetchMessages, 8000); 
                timestampInterval = setInterval(updateTimestamps, 20000); 
            }
        });

        document.getElementById('searchBar').addEventListener('input', renderMessages);
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value;
            if (!text.trim()) return;
            input.value = '';
            await sendMessage(text);
        });
    </script>
</body>
</html>
