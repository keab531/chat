<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Live Chat</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --sent-msg: #4f46e5;
            --received-msg: #f1f5f9;
        }

        body { 
            font-family: '-apple-system', BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg-main); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* ----- LOGIN SCREEN ----- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-top: 0; margin-bottom: 8px; font-weight: 700; font-size: 24px; }
        .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        .login-input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s;
            box-sizing: border-box; margin-bottom: 16px;
        }
        .login-input:focus { border-color: var(--primary); }
        .login-btn {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .login-btn:hover { background: var(--primary-hover); }

        /* ----- MAIN CHAT INTERFACE ----- */
        #chat-container { 
            width: 1000px; 
            max-width: 95vw;
            height: 750px; 
            max-height: 90vh;
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05); 
            display: flex; 
            overflow: hidden; 
            border: 1px solid var(--border);
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: #fdfdfd;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .search-box-wrapper { padding: 16px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%; padding: 8px 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; outline: none; background: #f8fafc;
            box-sizing: border-box;
        }
        .user-list-wrapper { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item {
            display: flex; align-items: center; padding: 10px; 
            border-radius: 8px; margin-bottom: 4px; font-size: 14px; font-weight: 500;
            color: var(--text-main); transition: background 0.2s;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--primary); margin-right: 12px; font-size: 12px;
        }

        /* Chat Window Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fafafa; }
        .chat-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-card);
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
        
        #chat-window { 
            flex: 1; padding: 24px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 16px; 
        }

        /* Messages */
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }

        .msg-username { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .message { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        
        .sent .message { background: var(--sent-msg); color: white; border-bottom-right-radius: 2px; }
        .received .message { background: var(--received-msg); color: var(--text-main); border-bottom-left-radius: 2px; }

        /* Input Bar */
        #input-area { 
            display: flex; border-top: 1px solid var(--border); 
            padding: 16px 24px; background: var(--bg-card); 
            align-items: center;
        }
        #user-input { 
            flex: 1; padding: 12px 18px; border: 1px solid var(--border); 
            border-radius: 24px; outline: none; font-size: 14px; background: #f8fafc;
        }
        #user-input:focus { border-color: var(--primary); background: #fff; }
        #send-btn { 
            padding: 12px 24px; background: var(--primary); color: white; 
            border: none; border-radius: 24px; margin-left: 12px; 
            cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s;
        }
        #send-btn:hover { background: var(--primary-hover); }
</style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>Welcome</h2>
            <p>Please enter your name to join the live workspace room.</p>
            <input type="text" id="username-input" class="login-input" placeholder="Your Name" autocomplete="off" maxlength="20">
            <button id="join-btn" class="login-btn">Join Chatroom</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="sidebar">
            <div class="search-box-wrapper">
                <input type="text" id="search-users" class="search-input" placeholder="Search users by name...">
            </div>
            <div class="user-list-wrapper" id="user-list">
                </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <h3 id="room-title"># global-workspace</h3>
                </div>
            </div>
            <div id="chat-window"></div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Write your message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 1. Paste Your Specific App Configuration Keys Here

      const firebaseConfig = {
        apiKey: "AIzaSyCDEwEwr6QbNIArFm4sGThxq4scpqDbbnE",
        databaseURL: "https://keabi-800a6-default-rtdb.firebaseio.com",
        projectId: "keabi-800a6",
      };


        // Initialize App Connection Instance 
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');

        // Document Object Cache Mapping
        const loginOverlay = document.getElementById('login-overlay');
        const usernameInput = document.getElementById('username-input');
        const joinBtn = document.getElementById('join-btn');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const searchUsers = document.getElementById('search-users');
        const userListContainer = document.getElementById('user-list');

        let myUsername = "";
        let trackedUsersSet = new Set(); 

        // Handshake Overlay Lifecycle Control
        function processJoin() {
            const nameValue = usernameInput.value.trim();
            if(!nameValue) return alert("Name field cannot be left blank.");
            
            myUsername = nameValue;
            loginOverlay.style.opacity = '0';
            setTimeout(() => loginOverlay.style.visibility = 'hidden', 300);
            userInput.focus();
        }

        joinBtn.addEventListener('click', processJoin);
        usernameInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') processJoin(); });

        // Build UI element for an incoming message
        function appendMessage(text, senderName) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('message-wrapper');
            
            if (senderName === myUsername) {
                wrapper.classList.add('sent');
                wrapper.innerHTML = `<div class="message">${escapeHTML(text)}</div>`;
            } else {
                wrapper.classList.add('received');
                wrapper.innerHTML = `
                    <span class="msg-username">${escapeHTML(senderName)}</span>
                    <div class="message">${escapeHTML(text)}</div>
                `;
            }

            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Maintain and redraw sidebar user logs dynamically
        function updateSidebarUserTracking(newName) {
            if(!newName || trackedUsersSet.has(newName)) return;
            trackedUsersSet.add(newName);
            renderUserList();
        }

        function renderUserList(filterText = "") {
            userListContainer.innerHTML = "";
            const cleanFilter = filterText.toLowerCase().trim();

            trackedUsersSet.forEach(user => {
                // Case-insensitive query check
                if(cleanFilter && !user.toLowerCase().includes(cleanFilter)) return;

                const userRow = document.createElement('div');
                userRow.classList.add('user-item');
                userRow.innerHTML = `
                    <div class="user-avatar">${user.charAt(0).toUpperCase()}</div>
                    <span>${escapeHTML(user)}</span>
                `;
                userListContainer.appendChild(userRow);
            });
        }

        // Realtime Fetch Pipeline Hook
        messagesRef.limitToLast(100).on('child_added', (snapshot) => {
            const data = snapshot.val();
            if(data && data.username && data.text) {
                updateSidebarUserTracking(data.username);
                appendMessage(data.text, data.username);
            }
        });

        // Outbound Push Dispatch
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !myUsername) return;

            messagesRef.push({
                username: myUsername,
                text: text,
                timestamp: Date.now()
            });

            userInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Search Bar Event Hook (Case-Insensitive Input Lookup)
        searchUsers.addEventListener('input', (e) => {
            renderUserList(e.target.value);
        });

        // XSS Prevention helper
        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
